tools:
  - class_name: "verl.tools.search_tool.SearchTool"
    config:
      type: native
      retrieval_service_url: ${oc.env:BRIGHT_RETRIEVAL_URL,"http://172.16.34.22:8516/batch_retrieve"}
      num_workers: 32
      topk: 3
    tool_schema:
      type: function
      function:
        name: retrieval
        description: "Return top-3 supporting documents from the BRIGHT corpus for the given query."
        parameters:
          type: object
          properties:
            query_list:
              type: array
              items:
                type: string
              description: "One or more well-formed search queries. Each query will be expanded against the BRIGHT retriever."
          required:
            - query_list
