hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath:
  - file://verl/trainer/config
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - algorithm.adv_estimator=grpo
    - data.train_batch_size=128
    - data.max_prompt_length=4096
    - data.max_response_length=4096
    - data.dataloader_num_workers=0
    - data.filter_overlong_prompts=True
    - data.truncation=error
    - data.return_raw_chat=True
    - actor_rollout_ref.model.path=/data/experiment_data_gamma/mingchen/models/final
    - actor_rollout_ref.actor.optim.lr=1e-6
    - actor_rollout_ref.rollout.multi_turn.max_assistant_turns=3
    - actor_rollout_ref.rollout.multi_turn.max_user_turns=3
    - actor_rollout_ref.model.use_remove_padding=True
    - actor_rollout_ref.actor.ppo_mini_batch_size=128
    - actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=4
    - actor_rollout_ref.actor.use_kl_loss=True
    - actor_rollout_ref.actor.kl_loss_coef=0.001
    - actor_rollout_ref.actor.kl_loss_type=low_var_kl
    - actor_rollout_ref.actor.entropy_coeff=0
    - actor_rollout_ref.model.enable_gradient_checkpointing=True
    - actor_rollout_ref.actor.fsdp_config.param_offload=True
    - actor_rollout_ref.actor.fsdp_config.optimizer_offload=True
    - actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=4
    - actor_rollout_ref.rollout.tensor_model_parallel_size=1
    - actor_rollout_ref.rollout.name=sglang
    - actor_rollout_ref.rollout.mode=async
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.85
    - actor_rollout_ref.rollout.n=5
    - actor_rollout_ref.rollout.free_cache_engine=True
    - actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=4
    - actor_rollout_ref.ref.fsdp_config.param_offload=True
    - actor_rollout_ref.rollout.trace.backend=mlflow
    - actor_rollout_ref.rollout.trace.token2text=True
    - algorithm.use_kl_in_reward=False
    - trainer.critic_warmup=0
    - trainer.logger=["wandb"]
    - trainer.rollout_data_dir=/data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main/rollout_data_batch
    - trainer.project_name=bright_tool-agent
    - trainer.experiment_name=qwen3-4b-think_bright_our_sft_32
    - trainer.n_gpus_per_node=2
    - trainer.nnodes=1
    - trainer.save_freq=50
    - trainer.total_training_steps=320
    - trainer.default_local_dir=verl_checkpoints
    - trainer.test_freq=50
    - data.train_files=/data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main/data_progress/bright/part_48_49_50_rounds_train.parquet
    - data.val_files=/data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main/data_progress/bright/part_48_49_50_rounds_dev.parquet
    - actor_rollout_ref.rollout.multi_turn.tool_config_path=/data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main/examples/sglang_multiturn/config/tool_config/bright_tool_config.yaml
    - trainer.total_epochs=7
  job:
    name: main_ppo
    chdir: null
    override_dirname: actor_rollout_ref.actor.entropy_coeff=0,actor_rollout_ref.actor.fsdp_config.optimizer_offload=True,actor_rollout_ref.actor.fsdp_config.param_offload=True,actor_rollout_ref.actor.kl_loss_coef=0.001,actor_rollout_ref.actor.kl_loss_type=low_var_kl,actor_rollout_ref.actor.optim.lr=1e-6,actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=4,actor_rollout_ref.actor.ppo_mini_batch_size=128,actor_rollout_ref.actor.use_kl_loss=True,actor_rollout_ref.model.enable_gradient_checkpointing=True,actor_rollout_ref.model.path=/data/experiment_data_gamma/mingchen/models/final,actor_rollout_ref.model.use_remove_padding=True,actor_rollout_ref.ref.fsdp_config.param_offload=True,actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=4,actor_rollout_ref.rollout.free_cache_engine=True,actor_rollout_ref.rollout.gpu_memory_utilization=0.85,actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=4,actor_rollout_ref.rollout.mode=async,actor_rollout_ref.rollout.multi_turn.max_assistant_turns=3,actor_rollout_ref.rollout.multi_turn.max_user_turns=3,actor_rollout_ref.rollout.multi_turn.tool_config_path=/data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main/examples/sglang_multiturn/config/tool_config/bright_tool_config.yaml,actor_rollout_ref.rollout.n=5,actor_rollout_ref.rollout.name=sglang,actor_rollout_ref.rollout.tensor_model_parallel_size=1,actor_rollout_ref.rollout.trace.backend=mlflow,actor_rollout_ref.rollout.trace.token2text=True,algorithm.adv_estimator=grpo,algorithm.use_kl_in_reward=False,data.dataloader_num_workers=0,data.filter_overlong_prompts=True,data.max_prompt_length=4096,data.max_response_length=4096,data.return_raw_chat=True,data.train_batch_size=128,data.train_files=/data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main/data_progress/bright/part_48_49_50_rounds_train.parquet,data.truncation=error,data.val_files=/data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main/data_progress/bright/part_48_49_50_rounds_dev.parquet,trainer.critic_warmup=0,trainer.default_local_dir=verl_checkpoints,trainer.experiment_name=qwen3-4b-think_bright_our_sft_32,trainer.logger=["wandb"],trainer.n_gpus_per_node=2,trainer.nnodes=1,trainer.project_name=bright_tool-agent,trainer.rollout_data_dir=/data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main/rollout_data_batch,trainer.save_freq=50,trainer.test_freq=50,trainer.total_epochs=7,trainer.total_training_steps=320
    id: ???
    num: ???
    config_name: bright_multiturn_grpo
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main/examples/sglang_multiturn/config
      schema: file
      provider: main
    - path: verl/trainer/config
      schema: file
      provider: hydra.searchpath in main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /data/experiment_data_gamma/mingchen/7_verl_agent_loop/ReasonIR_RL/6_verl_agent_loop/verl_main/outputs/2026-03-03/09-18-03
    choices:
      algorithm@algorithm.rollout_correction: rollout_correction
      reward_model: dp_reward_loop
      critic: dp_critic
      critic/../engine@critic.model.fsdp_config: fsdp
      critic/../optim@critic.optim: fsdp
      model@actor_rollout_ref.model: hf_model
      rollout@actor_rollout_ref.rollout: rollout
      ref@actor_rollout_ref.ref: dp_ref
      ref/../engine@actor_rollout_ref.ref.fsdp_config: fsdp
      data: legacy_data
      actor@actor_rollout_ref.actor: dp_actor
      actor/../engine@actor_rollout_ref.actor.fsdp_config: fsdp
      actor/../optim@actor_rollout_ref.actor.optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
